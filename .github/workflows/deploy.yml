name: Deploy Bot to EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd /home/ec2-user

            if ! command -v git >/dev/null 2>&1; then
              sudo yum install -y git
            fi

            if ! command -v mvn >/dev/null 2>&1; then
              sudo yum install -y maven-amazon-corretto21
            fi

            if ! systemctl list-unit-files | grep -q redis6; then
              sudo yum install -y redis6
            fi

            sudo systemctl enable redis6
            sudo systemctl start redis6

            if [ ! -d "TuneTailor-Deployment-220" ]; then
              git clone https://github.com/cs220s26/TuneTailor-Deployment-220.git
            fi

            cd /home/ec2-user/TuneTailor-Deployment-220
            chmod +x redeploy.sh
            ./redeploy.sh